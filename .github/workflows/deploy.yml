name: EC2 auto deploy

on:
  pull_request:
    branches: [ main ]
    types: [closed ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # IP取得ライブラリ
      - name: Get Public IP
        id: ip
        uses: haythem/public-ip@v1.3

      # コードを checkout
      - name: Checkout
        uses: actions/checkout@v2

      # 🔥 ここが必須（AWS CLI の認証設定）🔥
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      # デプロイ処理
      - name: Deploy to EC2
        run: |
          REGION="ap-northeast-1"

          # セキュリティグループを開放
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.EC2_SECURITY_GROUP_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.ip.outputs.ipv4 }}/32

          # 秘密鍵を保存
          cat << 'EOF' > private_key
          ${{ secrets.PRIVATE_KEY }}
          EOF
          chmod 600 private_key

          # SSHして git pull → .env生成 → ビルド
          ssh -oStrictHostKeyChecking=no \
            ${{ secrets.USER_NAME }}@${{ secrets.HOST_NAME }} \
            -i private_key \
            "cd /var/www/html && \
            git fetch --prune && git checkout main && git reset --hard origin/main && \
            printf 'VITE_API_KEY=${{ secrets.VITE_API_KEY }}\nVITE_AUTH_DOMAIN=${{ secrets.VITE_AUTH_DOMAIN }}\nVITE_PROJECT_ID=${{ secrets.VITE_PROJECT_ID }}\nVITE_STORAGE_BUCKET=${{ secrets.VITE_STORAGE_BUCKET }}\nVITE_MESSAGING_SENDER_ID=${{ secrets.VITE_MESSAGING_SENDER_ID }}\nVITE_APP_ID=${{ secrets.VITE_APP_ID }}\nVITE_MEASUREMENT_ID=${{ secrets.VITE_MEASUREMENT_ID }}\n' > .env && \
            npm install && npm run build"

          # セキュリティグループを閉じる
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.EC2_SECURITY_GROUP_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.ip.outputs.ipv4 }}/32
